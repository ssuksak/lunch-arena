<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <linearGradient id="school-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="roof-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <linearGradient id="spoon-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="spoon2-g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- ===== 학교 건물 ===== -->
  <!-- 건물 본체 -->
  <rect x="72" y="160" width="368" height="178" rx="6" fill="url(#school-wall)" opacity="0.85"/>
  <!-- 지붕 -->
  <rect x="58" y="136" width="396" height="34" rx="5" fill="url(#roof-g)" opacity="0.9"/>
  <!-- 중앙 탑 -->
  <rect x="210" y="90" width="92" height="56" rx="5" fill="#1E40AF" opacity="0.9"/>
  <!-- 탑 지붕 -->
  <rect x="200" y="78" width="112" height="20" rx="4" fill="#1D4ED8"/>
  <!-- 깃대 -->
  <line x1="256" y1="38" x2="256" y2="80" stroke="#1E40AF" stroke-width="4.5" stroke-linecap="round"/>
  <!-- 깃발 -->
  <polygon points="256,38 290,50 256,62" fill="#F97316"/>

  <!-- 창문 -->
  <g fill="rgba(255,255,255,0.88)">
    <rect x="90" y="175" width="54" height="46" rx="5"/>
    <rect x="164" y="175" width="54" height="46" rx="5"/>
    <rect x="294" y="175" width="54" height="46" rx="5"/>
    <rect x="368" y="175" width="54" height="46" rx="5"/>
  </g>
  <!-- 창문 살 -->
  <g stroke="#3B82F6" stroke-width="2" fill="none">
    <line x1="117" y1="175" x2="117" y2="221"/><line x1="90" y1="198" x2="144" y2="198"/>
    <line x1="191" y1="175" x2="191" y2="221"/><line x1="164" y1="198" x2="218" y2="198"/>
    <line x1="321" y1="175" x2="321" y2="221"/><line x1="294" y1="198" x2="348" y2="198"/>
    <line x1="395" y1="175" x2="395" y2="221"/><line x1="368" y1="198" x2="422" y2="198"/>
  </g>
  <!-- 현관문 -->
  <rect x="220" y="254" width="72" height="84" rx="7" fill="rgba(255,255,255,0.75)"/>
  <rect x="256" y="254" width="3" height="84" fill="rgba(59,130,246,0.3)"/>
  <!-- 문고리 -->
  <circle cx="248" cy="296" r="4" fill="#60A5FA"/>
  <circle cx="264" cy="296" r="4" fill="#60A5FA"/>

  <!-- 지면 선 -->
  <rect x="58" y="338" width="396" height="6" rx="3" fill="#1E40AF" opacity="0.3"/>

  <!-- ===== 숟가락 (왼쪽) ===== -->
  <g filter="url(#shadow)" transform="rotate(-22, 185, 280)">
    <!-- 숟가락 머리 -->
    <ellipse cx="185" cy="200" rx="32" ry="38" fill="url(#spoon-g)"/>
    <ellipse cx="183" cy="205" rx="22" ry="27" fill="#FCD34D" opacity="0.6"/>
    <!-- 숟가락 손잡이 -->
    <rect x="178" y="232" width="14" height="130" rx="7" fill="url(#spoon-g)"/>
  </g>

  <!-- ===== 젓가락 (오른쪽) ===== -->
  <g filter="url(#shadow)">
    <!-- 젓가락 1 -->
    <rect x="298" y="145" width="10" height="190" rx="5" fill="url(#spoon2-g)" transform="rotate(15, 303, 240)"/>
    <!-- 젓가락 2 -->
    <rect x="320" y="145" width="10" height="190" rx="5" fill="url(#spoon2-g)" transform="rotate(22, 325, 240)"/>
  </g>

  <!-- 텍스트 -->
  <text x="256" y="415"
        text-anchor="middle"
        font-family="NanumGothic,sans-serif"
        font-size="66" font-weight="900"
        fill="#1E40AF" letter-spacing="-1">오늘급식</text>
  <text x="256" y="453" text-anchor="middle"
        font-family="Arial,sans-serif"
        font-size="18" font-weight="700"
        fill="#F97316" letter-spacing="4">TODAY'S LUNCH</text>

  <!-- 별 장식 -->
  <g fill="#FCD34D">
    <circle cx="70" cy="448" r="5"/>
    <circle cx="442" cy="448" r="5"/>
    <circle cx="42" cy="420" r="3.5"/>
    <circle cx="470" cy="420" r="3.5"/>
  </g>
</svg>
