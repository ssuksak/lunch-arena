<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#3b1a8f"/>
    </linearGradient>
    <linearGradient id="bowl-shine" x1="20%" y1="10%" x2="80%" y2="90%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0d0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 배경 (둥근 모서리) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- 배경 광채 -->
  <ellipse cx="256" cy="220" rx="180" ry="160" fill="rgba(120,80,255,0.18)"/>

  <!-- 별 장식 -->
  <g fill="rgba(255,255,255,0.55)" filter="url(#glow)">
    <polygon points="88,110 93,124 108,124 96,133 101,148 88,139 75,148 80,133 68,124 83,124" transform="scale(0.55) translate(60,60)"/>
    <polygon points="420,80 424,92 436,92 426,100 430,112 420,104 410,112 414,100 404,92 416,92" transform="scale(0.45)"/>
    <circle cx="410" cy="155" r="5" fill="rgba(255,255,255,0.4)"/>
    <circle cx="95" cy="175" r="4" fill="rgba(255,255,255,0.35)"/>
    <circle cx="380" cy="310" r="3.5" fill="rgba(255,255,255,0.3)"/>
    <circle cx="130" cy="330" r="3" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- 점수 배지 (우상단) -->
  <rect x="340" y="110" width="96" height="42" rx="21" fill="rgba(255,200,60,0.92)"/>
  <text x="388" y="137" text-anchor="middle" font-family="NanumGothic,'맑은 고딕',sans-serif" font-size="22" font-weight="900" fill="#1a1a2e">S랭크</text>

  <!-- 그릇 몸체 -->
  <ellipse cx="256" cy="295" rx="130" ry="22" fill="rgba(255,255,255,0.15)"/>
  <path d="M126 240 Q126 320 256 320 Q386 320 386 240 Z" fill="url(#bowl-shine)" opacity="0.97"/>
  <!-- 그릇 테두리 -->
  <ellipse cx="256" cy="240" rx="130" ry="24" fill="url(#bowl-shine)" opacity="0.97"/>
  <!-- 그릇 내부 -->
  <ellipse cx="256" cy="240" rx="115" ry="19" fill="#d0c4f8"/>
  <!-- 밥 -->
  <ellipse cx="256" cy="236" rx="98" ry="16" fill="white" opacity="0.9"/>
  <ellipse cx="256" cy="230" rx="80" ry="11" fill="white"/>

  <!-- 김 (수증기) -->
  <g stroke="rgba(255,255,255,0.7)" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M210 200 Q215 185 210 170 Q205 155 210 140"/>
    <path d="M256 195 Q261 178 256 162 Q251 146 256 130"/>
    <path d="M302 200 Q307 185 302 170 Q297 155 302 140"/>
  </g>

  <!-- 텍스트: 오늘급식 -->
  <text x="256" y="408" text-anchor="middle"
        font-family="NanumGothic,'맑은 고딕',sans-serif"
        font-size="62" font-weight="900" fill="white" letter-spacing="-1">오늘급식</text>
  <!-- 텍스트 서브 -->
  <text x="256" y="445" text-anchor="middle"
        font-family="'Apple SD Gothic Neo','Noto Sans KR',Arial,sans-serif"
        font-size="22" font-weight="500" fill="rgba(255,255,255,0.55)" letter-spacing="2">TODAY'S LUNCH</text>
</svg>
