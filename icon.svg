<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#DDD6FE"/>
    </linearGradient>
    <linearGradient id="school-wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="bowl-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#EDE9FE"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>

  <!-- ===== 학교 건물 (상단 배경) ===== -->
  <!-- 건물 본체 -->
  <rect x="60" y="130" width="392" height="200" rx="6" fill="#C4B5FD" opacity="0.6"/>
  <!-- 지붕 (평지붕 + 탑) -->
  <rect x="50" y="110" width="412" height="30" rx="4" fill="#7C3AED" opacity="0.75"/>
  <!-- 중앙 탑 -->
  <rect x="214" y="70" width="84" height="50" rx="4" fill="#6D28D9" opacity="0.8"/>
  <rect x="228" y="58" width="56" height="20" rx="3" fill="#5B21B6" opacity="0.8"/>
  <!-- 깃발 -->
  <line x1="256" y1="30" x2="256" y2="62" stroke="#5B21B6" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <polygon points="256,30 284,40 256,50" fill="#F59E0B" opacity="0.85"/>
  <!-- 창문 행 1 -->
  <g fill="rgba(255,255,255,0.8)">
    <rect x="82" y="148" width="52" height="44" rx="5"/>
    <rect x="154" y="148" width="52" height="44" rx="5"/>
    <rect x="226" y="148" width="60" height="44" rx="5"/>
    <rect x="306" y="148" width="52" height="44" rx="5"/>
    <rect x="378" y="148" width="52" height="44" rx="5"/>
  </g>
  <!-- 창문 살 -->
  <g stroke="#A78BFA" stroke-width="2" fill="none" opacity="0.7">
    <line x1="108" y1="148" x2="108" y2="192"/><line x1="82" y1="170" x2="134" y2="170"/>
    <line x1="180" y1="148" x2="180" y2="192"/><line x1="154" y1="170" x2="206" y2="170"/>
    <line x1="256" y1="148" x2="256" y2="192"/><line x1="226" y1="170" x2="286" y2="170"/>
    <line x1="332" y1="148" x2="332" y2="192"/><line x1="306" y1="170" x2="358" y2="170"/>
    <line x1="404" y1="148" x2="404" y2="192"/><line x1="378" y1="170" x2="430" y2="170"/>
  </g>
  <!-- 출입구 -->
  <rect x="216" y="254" width="80" height="76" rx="8" fill="rgba(255,255,255,0.6)"/>
  <rect x="252" y="254" width="8" height="76" fill="rgba(167,139,250,0.3)"/>

  <!-- ===== 그릇 (앞면, 크게) ===== -->
  <!-- 그릇 그림자 -->
  <ellipse cx="256" cy="360" rx="112" ry="14" fill="rgba(109,40,217,0.2)"/>
  <!-- 그릇 몸통 -->
  <path d="M148 300 Q148 358 256 358 Q364 358 364 300 Z" fill="url(#bowl-g)"/>
  <!-- 그릇 테두리 -->
  <ellipse cx="256" cy="300" rx="108" ry="20" fill="white"/>
  <!-- 그릇 내부 -->
  <ellipse cx="256" cy="300" rx="92" ry="15" fill="#EDE9FE"/>
  <!-- 밥 -->
  <ellipse cx="256" cy="294" rx="78" ry="11" fill="#FFFBEB"/>
  <ellipse cx="252" cy="287" rx="56" ry="8" fill="white" opacity="0.9"/>

  <!-- 수증기 (그릇 위) -->
  <g stroke="#F59E0B" stroke-width="5.5" stroke-linecap="round" fill="none" opacity="0.8">
    <path d="M215 258 Q219 244 215 230 Q211 216 215 203"/>
    <path d="M256 252 Q260 237 256 222 Q252 207 256 194"/>
    <path d="M297 258 Q301 244 297 230 Q293 216 297 203"/>
  </g>

  <!-- 텍스트 오늘급식 -->
  <text x="256" y="418"
        text-anchor="middle"
        font-family="NanumGothic,sans-serif"
        font-size="68" font-weight="900"
        fill="#4C1D95" letter-spacing="-1">오늘급식</text>
  <text x="256" y="456" text-anchor="middle"
        font-family="Arial,sans-serif"
        font-size="18" font-weight="700"
        fill="#7C3AED" opacity="0.55" letter-spacing="4">TODAY'S LUNCH</text>

  <!-- 별 포인트 -->
  <g fill="#F59E0B" opacity="0.8">
    <circle cx="76" cy="438" r="5"/>
    <circle cx="436" cy="438" r="5"/>
  </g>
</svg>
