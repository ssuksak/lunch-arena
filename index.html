<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fff8f0">
<title>급식아레나 - 전국 학교급식 배틀</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff8f0;--surface:#fff;--text:#191f28;--text2:#4e5968;--text3:#8b95a1;--text4:#b0b8c1;
  --blue:#3182f6;--blue-l:#e8f3ff;--red:#f04452;--red-l:#ffecee;
  --green:#03b26c;--green-l:#e5f9f0;--yellow:#ff9f1c;--yellow-l:#fff4e0;
  --purple:#7c3aed;--purple-l:#f3e8ff;--orange:#ff6b2c;
  --border:#f0ebe4;--shadow:0 2px 8px rgba(0,0,0,0.05);--radius:18px;
}
body{font-family:'Pretendard Variable',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:80px}

/* 탭바 */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,248,240,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-item{flex:1;padding:8px 0 6px;text-align:center;cursor:pointer;transition:color .15s;color:var(--text3)}
.tab-item.active{color:var(--blue)}
.tab-item .tab-icon{font-size:22px;margin-bottom:2px}
.tab-item .tab-label{font-size:10px;font-weight:700;letter-spacing:-0.3px}

/* 앱바 */
.appbar{position:sticky;top:0;z-index:100;background:rgba(255,248,240,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:center;gap:8px}
.appbar h1{font-size:17px;font-weight:800;letter-spacing:-0.5px}

.container{max-width:480px;margin:0 auto;padding:0 16px}

/* 페이지 */
.page{display:none}
.page.active{display:block}

/* 홈 */
.hero{text-align:center;padding:24px 0 16px}
.hero-emoji{font-size:48px;animation:wiggle 2s ease-in-out infinite}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
.hero h2{font-size:22px;font-weight:800;letter-spacing:-0.6px;margin-top:4px}
.hero h2 em{font-style:normal;background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:13px;color:var(--text3);margin-top:4px}

.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-card{flex:1;background:var(--surface);border-radius:14px;padding:14px;text-align:center;border:1.5px solid var(--border)}
.stat-num{font-size:22px;font-weight:900;color:var(--blue)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600}

/* 검색 */
.search-wrap{position:relative;margin-bottom:16px}
.search-input{width:100%;padding:14px 16px 14px 42px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;font-size:15px;font-family:inherit;color:var(--text);-webkit-appearance:none}
.search-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.search-input::placeholder{color:var(--text4)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.08);z-index:50;max-height:300px;overflow-y:auto;display:none}
.search-results.show{display:block}
.sr-item{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sr-item:last-child{border-bottom:none}
.sr-item:active{background:var(--bg)}
.sr-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sr-icon.elem{background:var(--green-l)}
.sr-icon.mid{background:var(--blue-l)}
.sr-icon.high{background:var(--purple-l)}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-addr{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 학교 상세 */
.school-detail{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:14px}
.sd-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sd-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.sd-name{font-size:18px;font-weight:800;letter-spacing:-0.4px}
.sd-meta{font-size:12px;color:var(--text3);margin-top:2px}
.sd-close{margin-left:auto;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* 날짜 네비 */
.date-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.date-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.date-btn:active{background:var(--bg)}
.date-text{font-size:15px;font-weight:700;min-width:110px;text-align:center}

/* 메뉴 카드 */
.meal-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:14px}
.meal-score-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--border)}
.meal-score-big{font-size:36px;font-weight:900}
.meal-rank-badge{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:800}
.rank-s{background:linear-gradient(135deg,#ffd700,#ffb300);color:#7c5800}
.rank-a{background:var(--purple-l);color:var(--purple)}
.rank-b{background:var(--blue-l);color:var(--blue)}
.rank-c{background:var(--yellow-l);color:#b37400}
.rank-d{background:var(--bg);color:var(--text3)}

.menu-list{list-style:none}
.menu-list li{padding:5px 0;font-size:14px;color:var(--text2);display:flex;align-items:center;gap:6px}
.menu-list li.hl{color:var(--text);font-weight:600}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:800;flex-shrink:0}
.tag-pop{background:var(--yellow-l);color:var(--yellow)}
.tag-des{background:var(--purple-l);color:var(--purple)}
.tag-hlt{background:var(--green-l);color:var(--green)}

.meal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px dashed var(--border);font-size:12px;color:var(--text3)}

/* 평가 */
.rating-section{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:14px}
.rating-title{font-size:15px;font-weight:700;margin-bottom:12px}
.stars{display:flex;gap:6px;justify-content:center;margin-bottom:12px;padding:8px 0}
.star{width:36px;height:36px;cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:8px;background:var(--bg)}
.star:active{transform:scale(1.15)}
.star.filled{background:var(--yellow-l)}
.star.empty{opacity:.4}
.comment-input{width:100%;padding:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;resize:none;height:44px}
.comment-input:focus{outline:none;border-color:var(--blue)}
.btn-rate{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px}
.btn-rate:active{opacity:.85}
.btn-rate:disabled{background:var(--text4);cursor:not-allowed}

/* 리뷰 목록 */
.review-item{padding:12px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-header{display:flex;align-items:center;gap:6px;font-size:13px}
.review-stars{color:var(--yellow)}
.review-time{color:var(--text3);margin-left:auto;font-size:11px}
.review-text{font-size:13px;color:var(--text2);margin-top:4px}

/* 랭킹 */
.ranking-card{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1.5px solid var(--border);cursor:pointer}
.ranking-card:active{background:var(--bg)}
.rank-num{width:28px;font-size:18px;font-weight:900;text-align:center}
.rank-1{color:var(--yellow)}
.rank-2{color:var(--text3)}
.rank-3{color:var(--orange)}
.rank-info{flex:1;min-width:0}
.rank-school{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-menu-preview{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-score{font-size:18px;font-weight:900;color:var(--blue)}

/* 배틀 */
.battle-link{display:block;background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:var(--radius);padding:20px;text-align:center;color:white;text-decoration:none;margin-bottom:16px;box-shadow:0 4px 14px rgba(49,130,246,.3)}
.battle-link:active{opacity:.9}
.battle-link .bl-emoji{font-size:36px;margin-bottom:6px}
.battle-link .bl-title{font-size:17px;font-weight:800}
.battle-link .bl-sub{font-size:13px;opacity:.8;margin-top:2px}

/* 빈 상태 */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-emoji{font-size:40px;margin-bottom:10px}

/* 로딩 */
.loading{text-align:center;padding:32px}
.loading-emoji{font-size:36px;animation:cooking 1s ease-in-out infinite alternate}
@keyframes cooking{0%{transform:translateY(0)}100%{transform:translateY(-6px) rotate(8deg)}}
.loading-text{font-size:13px;color:var(--text3);margin-top:8px}

.section-title{font-size:16px;font-weight:800;letter-spacing:-0.3px;margin:20px 0 12px 4px}

/* 게임맵 */
.map-card{background:var(--surface);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:14px;position:relative}
.game-map-wrap{position:relative;width:100%;height:55vh;min-height:320px;max-height:480px;background:#e8dcc8;overflow:hidden;cursor:grab;touch-action:none}
.game-map-wrap:active{cursor:grabbing}
.game-map-inner{position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0}
.game-map-canvas{width:100%;height:100%}
.map-zoom-btns{position:absolute;bottom:12px;right:12px;display:flex;flex-direction:column;gap:4px;z-index:5}
.map-zoom-btn{width:36px;height:36px;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);color:var(--text2)}
.map-zoom-btn:active{background:var(--bg)}
.map-hint-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;font-size:12px;color:var(--text3);border-top:1px solid var(--border)}
.map-region-label{position:absolute;font-size:10px;font-weight:700;color:rgba(120,100,70,0.5);pointer-events:none;letter-spacing:1px;z-index:2}

/* 바텀시트 */
.bottom-sheet{position:absolute;bottom:0;left:0;right:0;z-index:20;background:var(--surface);border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.1);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:60vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,0)}
.bottom-sheet.show{transform:translateY(0)}
.bs-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto}
.bs-content{padding:0 20px 20px}
.bs-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bs-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bs-name{font-size:17px;font-weight:800;letter-spacing:-.3px}
.bs-meta{font-size:12px;color:var(--text3);margin-top:2px}
.bs-close{margin-left:auto;width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.bs-menu-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.bs-menu-list{list-style:none;margin-bottom:12px}
.bs-menu-list li{padding:3px 0;font-size:13px;color:var(--text2)}
.bs-score{display:inline-flex;align-items:center;gap:6px}
.bs-btn{display:block;width:100%;padding:12px;background:var(--blue);color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center}
.bs-btn:active{opacity:.85}

/* 커스텀 마커 */
.school-marker{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .15s}
.school-marker:hover{transform:scale(1.15)}
.sm-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.25);border:2.5px solid white;filter:saturate(3) brightness(1)}
.sm-icon.elem{background:#22c55e}
.sm-icon.mid{background:#3b82f6}
.sm-icon.high{background:#8b5cf6}
.sm-rank{font-size:9px;font-weight:900;color:white;background:var(--text);padding:1px 5px;border-radius:4px;margin-top:2px;letter-spacing:-.3px}
.sm-rank.rank-s{background:linear-gradient(135deg,#ffd700,#f59e0b)}
.sm-rank.rank-a{background:#8b5cf6}
.sm-rank.rank-b{background:#3b82f6}
.sm-rank.rank-c{background:#f59f00}
</style>
</head>
<body>

<div class="appbar">
  <h1>🍱 급식아레나</h1>
</div>

<!-- ===== 홈 페이지 ===== -->
<div class="page active" id="page-home">
  <div class="container">
    <div class="hero">
      <div class="hero-emoji">🏟</div>
      <h2>전국 학교 <em>급식 아레나</em></h2>
      <p>우리 학교 급식, 전국에서 몇 등?</p>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-schools">-</div>
        <div class="stat-label">등록 학교</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-meals">-</div>
        <div class="stat-label">오늘 급식</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-ratings">-</div>
        <div class="stat-label">평가</div>
      </div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search" placeholder="학교 이름으로 검색" autocomplete="off" oninput="onSearch(this.value)">
      <div class="search-results" id="search-results"></div>
    </div>

    <!-- 게임맵 -->
    <div class="map-card">
      <div class="game-map-wrap" id="game-map-wrap">
        <canvas class="game-map-canvas" id="game-map"></canvas>
        <div class="map-zoom-btns">
          <button class="map-zoom-btn" onclick="zoomMap(1)">+</button>
          <button class="map-zoom-btn" onclick="zoomMap(-1)">-</button>
        </div>
      </div>
      <div class="map-hint-bar">
        <span>🏰 학교를 탭해서 급식을 확인하세요</span>
        <span id="map-school-count">0개 학교</span>
      </div>
    </div>

    <!-- 바텀시트 -->
    <div class="bottom-sheet" id="bottom-sheet" style="position:fixed;z-index:300">
      <div class="bs-handle"></div>
      <div class="bs-content" id="bs-content"></div>
    </div>

    <!-- 학교 상세 (동적) -->
    <div id="school-detail-wrap"></div>

    <!-- 1:1 배틀 링크 -->
    <a class="battle-link" href="https://jinwoonghong.github.io/ssuksak-lunch/" target="_blank">
      <div class="bl-emoji">🥊</div>
      <div class="bl-title">1:1 급식 배틀</div>
      <div class="bl-sub">두 학교 급식을 비교해보세요</div>
    </a>

    <div class="section-title">🏆 오늘의 급식왕</div>
    <div id="today-ranking">
      <div class="loading"><div class="loading-emoji">🍳</div><div class="loading-text">랭킹 준비 중...</div></div>
    </div>
  </div>
</div>

<!-- ===== 랭킹 페이지 ===== -->
<div class="page" id="page-ranking">
  <div class="container">
    <div class="section-title" style="margin-top:16px">🏆 전국 급식 랭킹</div>
    <div class="date-nav">
      <button class="date-btn" onclick="changeRankDate(-1)">&lt;</button>
      <div class="date-text" id="rank-date"></div>
      <button class="date-btn" onclick="changeRankDate(1)">&gt;</button>
    </div>
    <div id="full-ranking">
      <div class="empty"><div class="empty-emoji">📊</div><div>학교를 검색하고 급식을 조회하면<br>랭킹이 자동으로 쌓여요!</div></div>
    </div>
  </div>
</div>

<!-- 탭바 -->
<div class="tab-bar">
  <div class="tab-item active" onclick="switchTab('home')">
    <div class="tab-icon">🏠</div>
    <div class="tab-label">홈</div>
  </div>
  <div class="tab-item" onclick="switchTab('ranking')">
    <div class="tab-icon">🏆</div>
    <div class="tab-label">랭킹</div>
  </div>
</div>

<script>
// ===== CONFIG =====
const SUPABASE_URL = 'https://puwthqzbounohrdmacgo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1d3RocXpib3Vub2hyZG1hY2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjA2MzMsImV4cCI6MjA5MDg5NjYzM30.AxUjNNTnLv2xVNC_UMFE3o0x0-s_tFJnRcMr7mBNOy0';

const sb = (path, opts = {}) => fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
  ...opts,
  headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': opts.prefer || '', ...opts.headers }
}).then(r => r.json());

const edge = (fn, body) => fetch(`${SUPABASE_URL}/functions/v1/${fn}`, {
  method: 'POST',
  headers: { 'Content-Type': 'application/json' },
  body: JSON.stringify(body)
}).then(r => r.json());

// ===== STATE =====
let currentSchool = null;
let mealDate = new Date();
let rankDate = new Date();
let searchTimer = null;
let selectedRating = 0;

// 주말 보정
function fixWeekend(d) {
  if (d.getDay() === 0) d.setDate(d.getDate() - 2);
  if (d.getDay() === 6) d.setDate(d.getDate() - 1);
  return d;
}
fixWeekend(mealDate);
fixWeekend(rankDate);

// ===== TABS =====
const tabIndex = { home: 0, ranking: 1 };
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('.tab-item')[tabIndex[tab]].classList.add('active');
  if (tab === 'ranking') loadFullRanking();
}

// ===== DATE =====
function fmtDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function fmtDateKR(d) { const days=['일','월','화','수','목','금','토']; return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`; }

// ===== SEARCH =====
async function onSearch(q) {
  clearTimeout(searchTimer);
  const box = document.getElementById('search-results');
  if (!q || q.length < 2) { box.classList.remove('show'); return; }
  searchTimer = setTimeout(async () => {

  }, 250);
}

async function selectSchool(id, atpt, code, name, type, addr) {
  document.getElementById('search-results').classList.remove('show');
  document.getElementById('search').value = '';
  currentSchool = { id, atpt, code, name, type, addr };
  mealDate = fixWeekend(new Date());
  renderSchoolDetail();

  // 지도에서도 해당 학교로 확대 이동
  const sData = await sb(`schools?id=eq.${id}&select=lat,lng`);
  if (sData && sData[0] && sData[0].lat) {
    const wrap = document.getElementById('game-map-wrap');
    const w = wrap.clientWidth, h = wrap.clientHeight;
    const [tx, ty] = geoToCanvas(sData[0].lat, sData[0].lng, w, h);
    mapScale = 20; // 최대 줌
    mapOffX = w/2 - tx * mapScale;
    mapOffY = h/2 - ty * mapScale;
    drawGameMap();
    // 지도 카드로 스크롤
    document.querySelector('.map-card').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}

const POPULAR=['치킨','피자','떡볶이','햄버거','돈까스','돈가스','카레','짜장','탕수육','제육','불고기','갈비','스파게티','파스타','라면','순대','핫도그','너겟'];
const DESSERTS=['케이크','아이스크림','푸딩','젤리','요구르트','요거트','딸기','귤','사과','바나나','포도','수박','초코','쿠키','빵','주스','우유'];
const HEALTHY=['나물','샐러드','두부','콩','시금치','브로콜리','당근','버섯','미역','김','고등어','연어','잡곡','보리','현미'];

function getRank(s){
  if(s>=90)return{r:'S',l:'전설의 급식',c:'rank-s'};
  if(s>=75)return{r:'A',l:'갓급식',c:'rank-a'};
  if(s>=55)return{r:'B',l:'괜찮은 급식',c:'rank-b'};
  if(s>=35)return{r:'C',l:'그저 그런 급식',c:'rank-c'};
  return{r:'D',l:'아쉬운 급식',c:'rank-d'};
}

async function loadMeal() {
  const mc = document.getElementById('meal-content');
  mc.innerHTML = '<div class="loading"><div class="loading-emoji">🍳</div><div class="loading-text">급식 메뉴 가져오는 중...</div></div>';

  const s = currentSchool;
  const dateStr = fmtDate(mealDate);

  const result = await edge('sync-meals', { atpt_code: s.atpt, school_code: s.code, date: dateStr });

  if (!result.meal) {
    mc.innerHTML = `<div class="empty"><div class="empty-emoji">😢</div><div>이 날은 급식 정보가 없어요</div></div>`;
    document.getElementById('rating-wrap').innerHTML = '';
    document.getElementById('reviews-wrap').innerHTML = '';
    return;
  }

  const meal = result.meal;
  const menu = meal.menu;
  const score = meal.auto_score;
  const rank = getRank(score);
  const cal = meal.calories;

  const items = menu.map(m => {
    let tag = '';
    for(const p of POPULAR){if(m.includes(p)){tag='<span class="tag tag-pop">인기</span>';break;}}
    if(!tag)for(const d of DESSERTS){if(m.includes(d)){tag='<span class="tag tag-des">후식</span>';break;}}
    if(!tag)for(const h of HEALTHY){if(m.includes(h)){tag='<span class="tag tag-hlt">건강</span>';break;}}
    return `<li${tag?' class="hl"':''}>${m} ${tag}</li>`;
  }).join('');

  const scoreColor = score >= 75 ? 'var(--blue)' : score >= 55 ? 'var(--green)' : score >= 35 ? 'var(--yellow)' : 'var(--text3)';

  mc.innerHTML = `
    <div class="meal-score-row">
      <div class="meal-score-big" style="color:${scoreColor}">${score}<span style="font-size:16px;color:var(--text3)">점</span></div>
      <div class="meal-rank-badge ${rank.c}">${rank.r}랭크 · ${rank.l}</div>
    </div>
    <ul class="menu-list">${items}</ul>
    <div class="meal-footer">
      <span>🔥 ${cal || '?'} kcal</span>
      <span>${result.cached ? '캐시됨' : '방금 조회'}</span>
    </div>
  `;

  renderRating(meal.id);
  loadReviews(meal.id);
}

// ===== REVIEWS =====
async function loadReviews(mealId) {
  const data = await sb(`ratings?meal_id=eq.${mealId}&order=created_at.desc&limit=20&select=score,comment,created_at`);
  if (!data || data.length === 0) {
    document.getElementById('reviews-wrap').innerHTML = '';
    return;
  }

  const items = data.map(r => {
    const stars = '⭐'.repeat(r.score);
    const ago = timeAgo(r.created_at);
    return `<div class="review-item">
      <div class="review-header"><span class="review-stars">${stars}</span><span class="review-time">${ago}</span></div>
      ${r.comment ? `<div class="review-text">${r.comment}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('reviews-wrap').innerHTML = `
    <div class="rating-section">
      <div class="rating-title">리뷰 ${data.length}개</div>
      ${items}
    </div>
  `;
}

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return '방금';
  if (m < 60) return m + '분 전';
  const h = Math.floor(m / 60);
  if (h < 24) return h + '시간 전';
  return Math.floor(h / 24) + '일 전';
}

// ===== GAME MAP =====
let mapSchools = [];
let mapScale = 1;
let mapOffX = 0, mapOffY = 0;
let isDragging = false, dragStartX, dragStartY, dragOffX, dragOffY;
const LAT_MIN = 33.0, LAT_MAX = 38.8, LNG_MIN = 125.5, LNG_MAX = 131.5;

// 한반도 해안선 (간략화 폴리곤)
const KOREA_OUTLINE = [
  [126.1,38.6],[126.6,37.8],[126.3,37.5],[126.5,37.0],[126.3,36.6],
  [126.5,36.2],[126.4,35.8],[126.8,35.1],[126.5,34.8],[126.9,34.3],
  [127.5,34.5],[127.8,34.8],[128.5,35.0],[128.8,35.1],[129.0,35.1],
  [129.2,35.2],[129.3,35.5],[129.4,35.8],[129.5,36.0],[129.5,36.5],
  [129.4,37.0],[129.2,37.5],[128.5,38.3],[128.0,38.5],[127.5,38.7],
  [127.0,38.8],[126.5,38.7],[126.1,38.6]
];

// 제주도
const JEJU_OUTLINE = [
  [126.1,33.2],[126.2,33.5],[126.6,33.5],[126.9,33.4],[126.9,33.2],[126.5,33.1],[126.1,33.2]
];

// 시도 중심 좌표 (라벨용)
const REGIONS = [
  { name: '서울', lat: 37.56, lng: 127.0 },
  { name: '경기', lat: 37.3, lng: 127.1 },
  { name: '인천', lat: 37.45, lng: 126.7 },
  { name: '강원', lat: 37.8, lng: 128.2 },
  { name: '충북', lat: 36.8, lng: 127.7 },
  { name: '충남', lat: 36.5, lng: 126.8 },
  { name: '대전', lat: 36.35, lng: 127.4 },
  { name: '세종', lat: 36.5, lng: 127.0 },
  { name: '전북', lat: 35.8, lng: 127.1 },
  { name: '전남', lat: 34.8, lng: 126.9 },
  { name: '광주', lat: 35.15, lng: 126.85 },
  { name: '경북', lat: 36.2, lng: 128.8 },
  { name: '대구', lat: 35.87, lng: 128.6 },
  { name: '경남', lat: 35.3, lng: 128.3 },
  { name: '부산', lat: 35.15, lng: 129.05 },
  { name: '울산', lat: 35.55, lng: 129.3 },
  { name: '제주', lat: 33.35, lng: 126.55 },
];

function geoToCanvas(lat, lng, w, h) {
  const x = ((lng - LNG_MIN) / (LNG_MAX - LNG_MIN)) * w;
  const y = ((LAT_MAX - lat) / (LAT_MAX - LAT_MIN)) * h;
  return [x, y];
}

function drawGameMap() {
  const canvas = document.getElementById('game-map');
  const wrap = document.getElementById('game-map-wrap');
  const dpr = window.devicePixelRatio || 1;
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.save();
  ctx.translate(mapOffX, mapOffY);
  ctx.scale(mapScale, mapScale);

  // 배경 (바다)
  ctx.fillStyle = '#d4e4c8';
  ctx.fillRect(-1000, -1000, w + 2000, h + 2000);

  // 바다
  ctx.fillStyle = '#b8d4e8';
  ctx.fillRect(0, 0, w, h);

  // 한반도 (땅)
  ctx.beginPath();
  ctx.fillStyle = '#e8dcc0';
  ctx.strokeStyle = '#c4b896';
  ctx.lineWidth = 2;
  KOREA_OUTLINE.forEach((p, i) => {
    const [x, y] = geoToCanvas(p[1], p[0], w, h);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // 제주도
  ctx.beginPath();
  JEJU_OUTLINE.forEach((p, i) => {
    const [x, y] = geoToCanvas(p[1], p[0], w, h);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // 지역 라벨
  ctx.font = '700 10px Pretendard Variable, sans-serif';
  ctx.fillStyle = 'rgba(140,120,80,0.4)';
  ctx.textAlign = 'center';
  REGIONS.forEach(r => {
    const [x, y] = geoToCanvas(r.lat, r.lng, w, h);
    ctx.fillText(r.name, x, y);
  });

  // 학교 마커
  const visibleSchools = [];
  let gridSet = new Set();
  for (const s of mapSchools) {
    const [x, y] = geoToCanvas(s.lat, s.lng, w, h);
    // 화면 밖이면 스킵
    const sx = x * mapScale + mapOffX;
    const sy = y * mapScale + mapOffY;
    if (sx < -20 || sx > w + 20 || sy < -20 || sy > h + 20) continue;

    visibleSchools.push({ ...s, cx: x, cy: y });

    const isElem = s.type?.includes('초');
    const isMid = s.type?.includes('중');
    // 줌 레벨별 크기 & 간격 조절
    const size = mapScale > 8 ? 3 : mapScale > 4 ? 2 : 1;

    // 줌아웃 시 겹침 방지: 그리드 기반 솎아내기
    if (mapScale < 4) {
      const gridKey = Math.floor(x / (6 / mapScale)) + ',' + Math.floor(y / (6 / mapScale));
      if (!gridSet) gridSet = new Set();
      if (gridSet.has(gridKey)) continue;
      gridSet.add(gridKey);
    }

    const mainColor = isElem ? '#22c55e' : isMid ? '#3b82f6' : '#8b5cf6';
    const lightColor = isElem ? '#86efac' : isMid ? '#93c5fd' : '#c4b5fd';
    const darkColor = isElem ? '#16a34a' : isMid ? '#2563eb' : '#7c3aed';

    if (mapScale > 12) {
      // 줌인 많이: 귀여운 학교 건물
      const s = 3;
      // 그림자
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      ctx.beginPath();
      ctx.ellipse(x, y + s * 1.1, s * 1.2, s * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      // 건물 몸체
      ctx.fillStyle = mainColor;
      ctx.beginPath();
      ctx.roundRect(x - s, y - s * 0.8, s * 2, s * 1.6, 2);
      ctx.fill();
      // 지붕 (삼각형)
      ctx.fillStyle = darkColor;
      ctx.beginPath();
      ctx.moveTo(x - s * 1.3, y - s * 0.8);
      ctx.lineTo(x, y - s * 1.8);
      ctx.lineTo(x + s * 1.3, y - s * 0.8);
      ctx.fill();
      // 창문
      ctx.fillStyle = lightColor;
      ctx.fillRect(x - s * 0.6, y - s * 0.4, s * 0.4, s * 0.4);
      ctx.fillRect(x + s * 0.2, y - s * 0.4, s * 0.4, s * 0.4);
      // 문
      ctx.fillStyle = darkColor;
      ctx.beginPath();
      ctx.roundRect(x - s * 0.25, y + s * 0.1, s * 0.5, s * 0.7, [2, 2, 0, 0]);
      ctx.fill();
      // 깃발
      ctx.strokeStyle = darkColor;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x + s * 0.8, y - s * 0.8);
      ctx.lineTo(x + s * 0.8, y - s * 2.2);
      ctx.stroke();
      ctx.fillStyle = mainColor;
      ctx.beginPath();
      ctx.moveTo(x + s * 0.8, y - s * 2.2);
      ctx.lineTo(x + s * 1.6, y - s * 1.9);
      ctx.lineTo(x + s * 0.8, y - s * 1.6);
      ctx.fill();
    } else if (mapScale > 6) {
      // 중간 줌: 핀 마커
      const s = 2.5;
      // 그림자
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.beginPath();
      ctx.ellipse(x, y + 1, s * 0.8, s * 0.25, 0, 0, Math.PI * 2);
      ctx.fill();
      // 핀 꼬리
      ctx.fillStyle = mainColor;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.lineTo(x - s * 0.5, y - s);
      ctx.lineTo(x + s * 0.5, y - s);
      ctx.fill();
      // 핀 머리 (원)
      ctx.beginPath();
      ctx.arc(x, y - s, s * 0.7, 0, Math.PI * 2);
      ctx.fill();
      // 내부 원 (하이라이트)
      ctx.fillStyle = lightColor;
      ctx.beginPath();
      ctx.arc(x, y - s, s * 0.35, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // 줌아웃: 글로우 도트
      // 후광
      ctx.fillStyle = mainColor + '30';
      ctx.beginPath();
      ctx.arc(x, y, size + 1.5, 0, Math.PI * 2);
      ctx.fill();
      // 점
      ctx.fillStyle = mainColor;
      ctx.beginPath();
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();

  document.getElementById('map-school-count').textContent = visibleSchools.length + '개 학교';

  // 클릭 영역 저장
  canvas._visibleSchools = visibleSchools;
}

async function loadMapSchools() {
  // Supabase max rows가 1000이므로 페이지네이션
  let all = [];
  let page = 0;
  const pageSize = 1000;
  while (true) {
    const from = page * pageSize;
    const to = from + pageSize - 1;
    const data = await fetch(`${SUPABASE_URL}/rest/v1/schools?select=id,name,type,lat,lng,atpt_code,school_code,address&lat=not.is.null&lng=not.is.null&order=id&limit=${pageSize}&offset=${from}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    }).then(r => r.json());
    if (!data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < pageSize) break;
    page++;
  }
  mapSchools = all;
  drawGameMap();
}

function zoomMap(dir) {
  const wrap = document.getElementById('game-map-wrap');
  const cx = wrap.clientWidth / 2;
  const cy = wrap.clientHeight / 2;
  const oldScale = mapScale;
  mapScale = Math.max(0.5, Math.min(20, mapScale * (dir > 0 ? 1.5 : 0.67)));
  // 중심점 유지
  mapOffX = cx - (cx - mapOffX) * (mapScale / oldScale);
  mapOffY = cy - (cy - mapOffY) * (mapScale / oldScale);
  drawGameMap();
}

// 드래그/패닝
function initMapInteraction() {
  const wrap = document.getElementById('game-map-wrap');
  const canvas = document.getElementById('game-map');

  function onStart(x, y) {
    isDragging = true;
    dragStartX = x; dragStartY = y;
    dragOffX = mapOffX; dragOffY = mapOffY;
  }
  function onMove(x, y) {
    if (!isDragging) return;
    mapOffX = dragOffX + (x - dragStartX);
    mapOffY = dragOffY + (y - dragStartY);
    drawGameMap();
  }
  function onEnd() { isDragging = false; }

  wrap.addEventListener('mousedown', e => onStart(e.clientX, e.clientY));
  window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  window.addEventListener('mouseup', onEnd);

  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 1) onStart(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 1) onMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  wrap.addEventListener('touchend', onEnd);

  // 클릭으로 학교 선택
  canvas.addEventListener('click', e => {
    if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) return;
    const rect = canvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left - mapOffX) / mapScale;
    const my = (e.clientY - rect.top - mapOffY) / mapScale;
    const schools = canvas._visibleSchools || [];
    const hitSize = mapScale > 2 ? 12 : 8;
    for (const s of schools) {
      if (Math.abs(s.cx - mx) < hitSize && Math.abs(s.cy - my) < hitSize) {
        openBottomSheet(s);
        return;
      }
    }
  });

  // 핀치 줌
  let lastDist = 0;
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2) {
      lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
  }, { passive: true });
  wrap.addEventListener('touchmove', e => {
    if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (lastDist > 0) {
        const delta = dist / lastDist;
        mapScale = Math.max(0.5, Math.min(20, mapScale * delta));
        drawGameMap();
      }
      lastDist = dist;
    }
  }, { passive: true });

  // 마우스 휠 줌
  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    zoomMap(e.deltaY < 0 ? 1 : -1);
  }, { passive: false });
}

// 리사이즈 대응
window.addEventListener('resize', () => { if (mapSchools.length) drawGameMap(); });

async function openBottomSheet(school) {
  const bs = document.getElementById('bottom-sheet');
  const bsc = document.getElementById('bs-content');
  const isElem = school.type?.includes('초');
  const isMid = school.type?.includes('중');
  const bgColor = isElem ? 'var(--green-l)' : isMid ? 'var(--blue-l)' : 'var(--purple-l)';
  const emoji = isElem ? '🌱' : isMid ? '📘' : '🎓';

  bsc.innerHTML = `
    <div class="bs-header">
      <div class="bs-icon" style="background:${bgColor}">${emoji}</div>
      <div>
        <div class="bs-name">${school.name}</div>
        <div class="bs-meta">${school.type || ''} · ${school.address || ''}</div>
      </div>
      <button class="bs-close" onclick="closeBottomSheet()">✕</button>
    </div>
    <div style="text-align:center;padding:16px;color:var(--text3)">
      <div class="loading-emoji" style="font-size:28px">🍳</div>
      <div style="font-size:13px;margin-top:6px">급식 메뉴 불러오는 중...</div>
    </div>
  `;
  bs.classList.add('show');

  // 급식 로드
  const dateStr = fmtDate(fixWeekend(new Date()));
  const result = await edge('sync-meals', { atpt_code: school.atpt_code, school_code: school.school_code, date: dateStr });

  if (result.meal) {
    const m = result.meal;
    const rank = getRank(m.auto_score);
    const menuHtml = m.menu.map(item => `<li>${item}</li>`).join('');

    bsc.innerHTML = `
      <div class="bs-header">
        <div class="bs-icon" style="background:${bgColor}">${emoji}</div>
        <div>
          <div class="bs-name">${school.name}</div>
          <div class="bs-meta">${school.type || ''} · ${school.address || ''}</div>
        </div>
        <button class="bs-close" onclick="closeBottomSheet()">✕</button>
      </div>
      <div class="bs-menu-title">
        <span>📅 ${fmtDateKR(fixWeekend(new Date()))} 급식</span>
        <div class="bs-score">
          <span class="meal-rank-badge ${rank.c}" style="font-size:12px;padding:3px 10px">${rank.r} · ${m.auto_score}점</span>
        </div>
      </div>
      <ul class="bs-menu-list">${menuHtml}</ul>
      <div style="font-size:12px;color:var(--text3);margin-bottom:14px">🔥 ${m.calories || '?'} kcal</div>
      <button class="bs-btn" onclick="selectSchool(${school.id},'${school.atpt_code}','${school.school_code}','${school.name}','${school.type||''}','${(school.address||'').replace(/'/g,"\\'")}');switchTab('home');closeBottomSheet()">
        상세보기 · 평가하기
      </button>
    `;
  } else {
    bsc.innerHTML = `
      <div class="bs-header">
        <div class="bs-icon" style="background:${bgColor}">${emoji}</div>
        <div>
          <div class="bs-name">${school.name}</div>
          <div class="bs-meta">${school.type || ''} · ${school.address || ''}</div>
        </div>
        <button class="bs-close" onclick="closeBottomSheet()">✕</button>
      </div>
      <div style="text-align:center;padding:16px;color:var(--text3)">
        <div style="font-size:28px;margin-bottom:6px">😢</div>
        <div style="font-size:14px">오늘 급식 정보가 없어요</div>
      </div>
      <button class="bs-btn" onclick="selectSchool(${school.id},'${school.atpt_code}','${school.school_code}','${school.name}','${school.type||''}','${(school.address||'').replace(/'/g,"\\'")}');switchTab('home');closeBottomSheet()">
        다른 날짜 확인하기
      </button>
    `;
  }
}

function closeBottomSheet() {
  document.getElementById('bottom-sheet').classList.remove('show');
}

function goMyLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const wrap = document.getElementById('game-map-wrap');
    const w = wrap.clientWidth, h = wrap.clientHeight;
    const [tx, ty] = geoToCanvas(pos.coords.latitude, pos.coords.longitude, w, h);
    mapScale = 4;
    mapOffX = w/2 - tx * mapScale;
    mapOffY = h/2 - ty * mapScale;
    drawGameMap();
  });
}

// 맵 초기화
initMapInteraction();
loadMapSchools();

init();
</script>
