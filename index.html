<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#fff8f0">
<title>오늘급식 - 우리 학교 급식 점수는?</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fff8f0;--surface:#fff;--text:#191f28;--text2:#4e5968;--text3:#8b95a1;--text4:#b0b8c1;
  --blue:#3182f6;--blue-l:#e8f3ff;--red:#f04452;--red-l:#ffecee;
  --green:#03b26c;--green-l:#e5f9f0;--yellow:#ff9f1c;--yellow-l:#fff4e0;
  --purple:#7c3aed;--purple-l:#f3e8ff;--orange:#ff6b2c;--orange-l:#fff1e8;
  --neon:#d4ff4f;--neon-l:#f8ffe0;--battle-red:#ff4757;--battle-red-l:#fff0f1;
  --border:#f0ebe4;--shadow:0 2px 8px rgba(0,0,0,0.05);--shadow-lg:0 8px 30px rgba(0,0,0,.1);--radius:18px;
}
body{font-family:'Pretendard Variable',-apple-system,system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:80px}

/* 탭바 */
.tab-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,248,240,0.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0)}
.tab-item{flex:1;padding:8px 0 6px;text-align:center;cursor:pointer;transition:color .15s;color:var(--text3)}
.tab-item.active{color:var(--blue)}
.tab-item.active .tab-icon{transform:scale(1.15)}
.tab-item .tab-icon{font-size:22px;margin-bottom:2px;transition:transform .15s;display:block}
.tab-item .tab-label{font-size:10px;font-weight:700;letter-spacing:-0.3px}

/* 앱바 */
.appbar{position:sticky;top:0;z-index:100;background:rgba(255,248,240,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.appbar-logo{font-size:17px;font-weight:800;letter-spacing:-0.5px}
.appbar-right{display:flex;align-items:center;gap:8px}

/* 레이아웃 */
.container{max-width:480px;margin:0 auto;padding:0 16px}
.page{display:none;animation:fadeIn .2s ease}
.page.active{display:block}
@keyframes fadeIn{from{opacity:.6}to{opacity:1}}

/* 온보딩 오버레이 */
.onboarding{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.onboarding.hide{display:none}
.ob-emoji{font-size:64px;margin-bottom:16px;animation:wiggle 2s ease-in-out infinite}
.ob-title{font-size:24px;font-weight:900;letter-spacing:-0.6px;margin-bottom:8px}
.ob-sub{font-size:15px;color:var(--text3);margin-bottom:32px;line-height:1.5}
.ob-search{width:100%;position:relative;margin-bottom:12px}
.ob-input{width:100%;padding:16px 16px 16px 44px;background:var(--surface);border:2px solid var(--border);border-radius:16px;font-size:16px;font-family:inherit;color:var(--text)}
.ob-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.12)}
.ob-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px}
.ob-results{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);max-height:280px;overflow-y:auto;display:none;text-align:left;margin-top:4px}
.ob-results.show{display:block}

/* 검색 */
.search-wrap{position:relative;margin-bottom:16px}
.search-input{width:100%;padding:14px 16px 14px 42px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;font-size:15px;font-family:inherit;color:var(--text);-webkit-appearance:none}
.search-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(49,130,246,.1)}
.search-input::placeholder{color:var(--text4)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);z-index:50;max-height:300px;overflow-y:auto;display:none}
.search-results.show{display:block}
.sr-item{padding:14px 16px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sr-item:last-child{border-bottom:none}
.sr-item:active{background:var(--bg)}
.sr-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sr-icon.elem{background:var(--green-l)} .sr-icon.mid{background:var(--blue-l)} .sr-icon.high{background:var(--purple-l)}
.sr-info{flex:1;min-width:0}
.sr-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-addr{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 홈 — 내 학교 카드 */
.my-school-card{background:linear-gradient(135deg,var(--blue),var(--purple));border-radius:var(--radius);padding:20px;margin-bottom:14px;color:white;position:relative;overflow:hidden}
.msc-wave{position:absolute;bottom:-10px;left:-10px;right:-10px;height:60px;background:rgba(255,255,255,0.06);border-radius:50%}
.msc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.msc-label{font-size:11px;font-weight:700;opacity:.7;letter-spacing:.5px;text-transform:uppercase}
.msc-change{font-size:12px;font-weight:700;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);border-radius:8px;padding:4px 10px;cursor:pointer;color:white}
.msc-name{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
.msc-type{font-size:13px;opacity:.75}
.msc-score-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.msc-score{font-size:42px;font-weight:900;line-height:1}
.msc-rank-badge{font-size:13px;font-weight:800;background:rgba(255,255,255,0.2);border-radius:8px;padding:6px 12px}
.msc-streak{display:inline-flex;align-items:center;gap:4px;background:rgba(212,255,79,0.25);border:1px solid rgba(212,255,79,0.5);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:800;color:var(--neon);margin-top:8px}

/* 스탯 */
.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-card{flex:1;background:var(--surface);border-radius:14px;padding:14px;text-align:center;border:1.5px solid var(--border)}
.stat-num{font-size:22px;font-weight:900;color:var(--blue)}
.stat-label{font-size:11px;color:var(--text3);margin-top:2px;font-weight:600}

/* 섹션 타이틀 */
.section-title{font-size:16px;font-weight:800;letter-spacing:-0.3px;margin:20px 0 12px 2px;display:flex;align-items:center;justify-content:space-between}
.section-more{font-size:13px;font-weight:600;color:var(--blue);cursor:pointer}

/* 메뉴 카드 */
.meal-card{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:14px}
.meal-score-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:12px;border-bottom:1px dashed var(--border)}
.meal-score-big{font-size:36px;font-weight:900}
.meal-rank-badge{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:800}
.rank-s{background:linear-gradient(135deg,#ffd700,#ffb300);color:#7c5800}
.rank-a{background:var(--purple-l);color:var(--purple)}
.rank-b{background:var(--blue-l);color:var(--blue)}
.rank-c{background:var(--yellow-l);color:#b37400}
.rank-d{background:var(--bg);color:var(--text3)}
.menu-list{list-style:none}
.menu-list li{padding:5px 0;font-size:14px;color:var(--text2);display:flex;align-items:center;gap:6px}
.menu-list li.hl{color:var(--text);font-weight:600}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:800;flex-shrink:0}
.tag-pop{background:var(--yellow-l);color:var(--yellow)} .tag-des{background:var(--purple-l);color:var(--purple)} .tag-hlt{background:var(--green-l);color:var(--green)}
.meal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px dashed var(--border);font-size:12px;color:var(--text3)}

/* 날짜 네비 */
.date-nav{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
.date-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.date-btn:active{background:var(--bg)}
.date-text{font-size:15px;font-weight:700;min-width:110px;text-align:center}

/* 학교 상세 */
.school-detail{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:14px}
.sd-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sd-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.sd-name{font-size:18px;font-weight:800;letter-spacing:-0.4px}
.sd-meta{font-size:12px;color:var(--text3);margin-top:2px}
.sd-close{margin-left:auto;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

/* 평가 */
.rating-section{background:var(--surface);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1.5px solid var(--border);margin-bottom:14px}
.rating-title{font-size:15px;font-weight:700;margin-bottom:12px}
.stars{display:flex;gap:6px;justify-content:center;margin-bottom:12px;padding:8px 0}
.star{width:36px;height:36px;cursor:pointer;transition:transform .1s;display:flex;align-items:center;justify-content:center;font-size:22px;border-radius:8px;background:var(--bg)}
.star:active{transform:scale(1.15)} .star.filled{background:var(--yellow-l)} .star.empty{opacity:.4}
.comment-input{width:100%;padding:12px;background:var(--bg);border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;resize:none;height:44px}
.comment-input:focus{outline:none;border-color:var(--blue)}
/* 사진 업로드 */
.photo-upload{margin-top:10px}
.photo-label{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed var(--border);border-radius:12px;cursor:pointer;font-size:14px;color:var(--text3);transition:border-color .15s}
.photo-label:hover{border-color:var(--blue);color:var(--blue)}
.photo-preview{display:none;position:relative;margin-top:8px}
.photo-preview img{width:100%;max-height:180px;object-fit:cover;border-radius:10px}
.photo-remove{position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,.5);color:white;border:none;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.btn-rate{width:100%;padding:14px;background:var(--blue);color:white;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px}
.btn-rate:active{opacity:.85} .btn-rate:disabled{background:var(--text4);cursor:not-allowed}

/* 리뷰 */
.review-item{padding:12px 0;border-bottom:1px solid var(--border)}
.review-item:last-child{border-bottom:none}
.review-header{display:flex;align-items:center;gap:6px;font-size:13px}
.review-stars{color:var(--yellow)} .review-time{color:var(--text3);margin-left:auto;font-size:11px}
.review-text{font-size:13px;color:var(--text2);margin-top:4px}
.review-photo{margin-top:6px;border-radius:8px;max-width:200px;max-height:150px;object-fit:cover}

/* 지도 */
.kakao-map-wrap{position:relative;width:100%;height:calc(100vh - 56px - 80px)}
#kakao-map{width:100%;height:100%;filter:saturate(0.45) brightness(1.1) contrast(0.9) sepia(0.15)}
.map-hint-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;font-size:12px;color:var(--text3);border-top:1px solid var(--border);background:var(--surface)}
.map-my-btn{padding:6px 12px;background:var(--blue);color:white;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
.school-marker{display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:transform .15s}
.school-marker:hover{transform:scale(1.15)}
.sm-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,.25);border:2.5px solid white}
.sm-icon.elem{background:#22c55e} .sm-icon.mid{background:#3b82f6} .sm-icon.high{background:#8b5cf6}
.sm-rank{font-size:9px;font-weight:900;color:white;padding:1px 5px;border-radius:4px;margin-top:2px;letter-spacing:-.3px}
.sm-rank.rank-s{background:linear-gradient(135deg,#ffd700,#f59e0b)} .sm-rank.rank-a{background:#8b5cf6} .sm-rank.rank-b{background:#3b82f6} .sm-rank.rank-c{background:#f59f00}

/* 바텀시트 */
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:300;background:var(--surface);border-radius:20px 20px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.12);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:70vh;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom,0) + 80px)}
.bottom-sheet.show{transform:translateY(0)}
.bs-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto}
.bs-content{padding:0 20px 20px}
.bs-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bs-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.bs-name{font-size:17px;font-weight:800;letter-spacing:-.3px} .bs-meta{font-size:12px;color:var(--text3);margin-top:2px}
.bs-close{margin-left:auto;width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.bs-menu-title{font-size:14px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.bs-menu-list{list-style:none;margin-bottom:12px}
.bs-menu-list li{padding:3px 0;font-size:13px;color:var(--text2)}
.bs-btn{display:block;width:100%;padding:12px;background:var(--blue);color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center}
.bs-btn:active{opacity:.85}

/* 배틀 */
.battle-header{text-align:center;padding:20px 0 12px}
.battle-header h2{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-top:4px}
.battle-header p{font-size:13px;color:var(--text3);margin-top:4px}
.vs-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow)}
.vs-top{display:grid;grid-template-columns:1fr auto 1fr;gap:0}
.vs-school{padding:16px;display:flex;flex-direction:column}
.vs-school.b{align-items:flex-end;text-align:right}
.vs-school-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:8px}
.vs-school-name{font-size:14px;font-weight:800;letter-spacing:-.3px;line-height:1.2}
.vs-score{font-size:26px;font-weight:900;margin-top:4px}
.vs-score.win{color:var(--blue)} .vs-score.lose{color:var(--text4)}
.vs-divider{display:flex;align-items:center;justify-content:center;padding:0 4px}
.vs-badge{width:36px;height:36px;background:linear-gradient(135deg,var(--battle-red),#ff6b2c);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:900;box-shadow:0 4px 12px rgba(255,71,87,.4)}
.vs-menu-row{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border)}
.vs-menu{padding:12px 14px}
.vs-menu.b{border-left:1px solid var(--border)}
.vs-menu ul{list-style:none}
.vs-menu ul li{font-size:12px;color:var(--text2);padding:2px 0}
.vs-vote-row{padding:16px;border-top:1px solid var(--border);display:flex;gap:10px}
.btn-vote{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:800;font-family:inherit;cursor:pointer;transition:transform .1s}
.btn-vote:active{transform:scale(.97)}
.btn-vote.a{background:var(--blue-l);color:var(--blue)}
.btn-vote.b{background:var(--purple-l);color:var(--purple)}
.btn-vote.selected{opacity:1} .btn-vote.unselected{opacity:.45}
/* 투표 결과 바 */
.vote-result{padding:14px 16px;border-top:1px solid var(--border)}
.vote-bar-wrap{margin-bottom:10px}
.vote-bar-labels{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:4px}
.vote-bar-bg{height:10px;background:var(--bg);border-radius:5px;overflow:hidden;display:flex}
.vote-bar-a{height:100%;background:var(--blue);border-radius:5px;transition:width .5s ease}
.vote-bar-b{height:100%;background:var(--purple);border-radius:5px;transition:width .5s ease}
.vote-winner{text-align:center;font-size:15px;font-weight:800;margin-top:8px}
.vote-share-btn{width:100%;margin-top:10px;padding:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;color:var(--text2)}

/* 랭킹 */
.ranking-card{background:var(--surface);border-radius:14px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;border:1.5px solid var(--border);cursor:pointer}
.ranking-card:active{background:var(--bg)}
.ranking-card.mine{border-color:var(--blue);background:var(--blue-l)}
.rank-num{width:28px;font-size:18px;font-weight:900;text-align:center}
.rank-1{color:var(--yellow)} .rank-2{color:var(--text3)} .rank-3{color:var(--orange)}
.rank-info{flex:1;min-width:0}
.rank-school{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-menu-preview{font-size:12px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-score{font-size:18px;font-weight:900;color:var(--blue)}

/* 빈 상태 / 로딩 */
.empty{text-align:center;padding:40px 20px;color:var(--text3)}
.empty-emoji{font-size:40px;margin-bottom:10px}
.loading{text-align:center;padding:32px}
.loading-emoji{font-size:36px;animation:cooking 1s ease-in-out infinite alternate}
@keyframes cooking{0%{transform:translateY(0)}100%{transform:translateY(-6px) rotate(8deg)}}
.loading-text{font-size:13px;color:var(--text3);margin-top:8px}
@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
.hide{display:none!important}

/* 필터 칩 */
.filter-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;white-space:nowrap;color:var(--text3)}
.chip.active{background:var(--blue);border-color:var(--blue);color:white}

/* 홈 히어로 */
.home-hero{padding:28px 0 16px;text-align:center}
.home-hero-emoji{font-size:52px;animation:wiggle 2s ease-in-out infinite}
.home-hero-title{font-size:22px;font-weight:900;letter-spacing:-.6px;margin:8px 0 4px}
.home-hero-title em{font-style:normal;background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.home-hero-sub{font-size:13px;color:var(--text3)}
.home-search-big{position:relative;margin:16px 0}
.home-search-big input{width:100%;padding:16px 16px 16px 46px;background:var(--surface);border:2px solid var(--border);border-radius:16px;font-size:16px;font-family:inherit;color:var(--text);box-shadow:var(--shadow-lg)}
.home-search-big input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 4px rgba(49,130,246,.12)}

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1d3RocXpib3Vub2hyZG1hY2dvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMjA2MzMsImV4cCI6MjA5MDg5NjYzM30.AxUjNNTnLv2xVNC_UMFE3o0x0-s_tFJnRcMr7mBNOy0';

// ===== FINGERPRINT (스팸 방지) =====
function getFingerprint() {
  let fp = localStorage.getItem('arena_fp');
  if (!fp) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillText('오늘급식', 2, 2);
    const cv = canvas.toDataURL().slice(-50);
    const raw = cv + screen.width + 'x' + screen.height + (Intl.DateTimeFormat().resolvedOptions().timeZone || '') + (navigator.language || '');
    fp = btoa(unescape(encodeURIComponent(raw))).replace(/[^a-z0-9]/gi,'').slice(0, 32);
    localStorage.setItem('arena_fp', fp);
  }
  return fp;
}
const FP = getFingerprint();

// ===== USER IDENTITY (Toss hash key 우선, fingerprint fallback) =====
// 토스 미니앱에서는 getAnonymousKey()로 기기간 동일한 사용자 식별 가능
// 일반 브라우저는 기존 fingerprint 사용
window.USER = null; // {id, source}
async function getUserId() {
  if (window.USER) return window.USER;
  // 1순위: 토스 앱 내부 실행 시 — @apps-in-toss/web-framework의 getAnonymousKey()
  try {
    const mod = await import('https://esm.sh/@apps-in-toss/web-framework@^2.4.5');
    if (mod && typeof mod.getAnonymousKey === 'function') {
      const key = await mod.getAnonymousKey();
      if (key && typeof key === 'string') {
        window.USER = { id: 'toss_' + key, source: 'toss' };
        return window.USER;
      }
    }
  } catch (e) {
    // 토스앱 밖이거나 SDK 로드 실패 → fingerprint로 폴백
  }
  // 2순위: 브라우저 fingerprint
  window.USER = { id: 'fp_' + FP, source: 'fp' };
  return window.USER;
}

let mySchool = null;

function fixWeekend(d) {
  if (d.getDay() === 0) d.setDate(d.getDate() - 2);

function fmtDate(d) { return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); }
function fmtDateKR(d) { const days=['일','월','화','수','목','금','토']; return `${d.getMonth()+1}/${d.getDate()} (${days[d.getDay()]})`; }
function timeAgo(ts) {
  const m = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
  if (m < 1) return '방금'; if (m < 60) return m + '분 전';
  const h = Math.floor(m / 60); if (h < 24) return h + '시간 전';
  return Math.floor(h / 24) + '일 전';
}

// ===== TABS =====
const tabOrder = { home: 0, map: 1, battle: 2, ranking: 3 };
function switchTab(tab) {

// ===== MY SCHOOL =====
// 우선순위: Supabase user_schools → localStorage (기존 사용자 호환)
async function loadMySchool() {
  await getUserId(); // window.USER 준비

  // 1순위: Supabase에서 user_hash로 조회
  try {
    const rows = await sb(`user_schools?user_hash=eq.${encodeURIComponent(window.USER.id)}&select=*`);
    if (Array.isArray(rows) && rows.length > 0) {
      const r = rows[0];
      mySchool = {
        id: r.school_id,
        name: r.school_name,
        type: r.school_type,
        atpt_code: r.atpt_code,
        school_code: r.school_code,
        address: r.address
      };
      localStorage.setItem('arena_school', JSON.stringify(mySchool));
      applyMySchool();
      return;
    }
  } catch (e) { /* 네트워크 오류 → localStorage로 폴백 */ }

  // 2순위: localStorage (기존 사용자)
  const raw = localStorage.getItem('arena_school');
  if (raw) {
    try {
      mySchool = JSON.parse(raw);
      applyMySchool();
      // 기존 localStorage 값을 Supabase에도 마이그레이션
      saveMySchoolToDb();
    } catch (e) {}
  }
}

// Supabase user_schools 테이블에 현재 mySchool 저장 (upsert)
// 반환: { ok: true } | { ok: false, code: 'LIMIT', message, status } | { ok: false, code: 'NET', ... }
async function saveMySchoolToDb() {
  if (!window.USER || !mySchool || !mySchool.id) return { ok: true };
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/user_schools?on_conflict=user_hash`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({
        user_hash: window.USER.id,
        source: window.USER.source,
        school_id: mySchool.id,
        school_name: mySchool.name || null,
        school_type: mySchool.type || null,
        atpt_code: mySchool.atpt_code || null,
        school_code: mySchool.school_code || null,
        address: mySchool.address || null,
        updated_at: new Date().toISOString()
      })
    });
    if (!res.ok) {
      const text = await res.text().catch(() => '');
      if (text.includes('SCHOOL_CHANGE_LIMIT_EXCEEDED')) {
        return { ok: false, code: 'LIMIT', message: text };
      }
      return { ok: false, code: 'NET', status: res.status, message: text };
    }
    return { ok: true };
  } catch (e) {
    return { ok: false, code: 'NET', message: String(e) };
  }
}

// 변경 가능 횟수/다음 가능일 조회 (get_school_change_status RPC)
async function fetchSchoolChangeStatus() {
  if (!window.USER) return null;
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_school_change_status`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ p_user_hash: window.USER.id })
    });
    if (!res.ok) return null;
    const rows = await res.json();
    const row = Array.isArray(rows) ? rows[0] : rows;
    if (!row) return { used_count: 0, remaining_count: 3, next_available_at: null };
    window.SCHOOL_CHANGE_STATUS = row;
    return row;
  } catch (e) { return null; }
}

  const ab = document.getElementById('appbar-school');
  ab.textContent = s.name;
  ab.style.background = 'var(--green-l)';
  ab.style.color = 'var(--green)';

  loadMySchoolStats();
}
async function openSchoolSetSheet() {
  // 이미 등록된 사용자의 "변경" 시도 시 한도 체크 (첫 등록은 mySchool이 null이므로 통과)
  if (mySchool && mySchool.id) {
    const st = await fetchSchoolChangeStatus();
    if (st && st.remaining_count === 0 && st.next_available_at) {
      const dt = new Date(st.next_available_at);
      const dateStr = `${dt.getMonth()+1}월 ${dt.getDate()}일`;
      alert(`학교 변경은 30일에 최대 3번까지 가능해요 🙂\n\n다음 변경 가능일: ${dateStr}`);
      return;
    }
  }
  document.getElementById('school-set-sheet').classList.add('show');
  document.getElementById('set-school-input').value = '';
  document.getElementById('set-school-results').innerHTML = '';
  setTimeout(() => document.getElementById('set-school-input').focus(), 300);
}
function closeSchoolSetSheet() {
  document.getElementById('school-set-sheet').classList.remove('show');
}
async function selectMySchool(s) {
  // 같은 학교면 그냥 닫기
  if (mySchool && mySchool.id === s.id) {
    closeSchoolSetSheet();
    return;
  }
  const isChange = !!(mySchool && mySchool.id);
  const prev = mySchool;
  mySchool = s;
  localStorage.setItem('arena_school', JSON.stringify(s));
  const result = await saveMySchoolToDb();
  if (!result.ok && result.code === 'LIMIT') {
    // 서버에서 차단됨 → 롤백
    mySchool = prev;
    if (prev) localStorage.setItem('arena_school', JSON.stringify(prev));
    // 최신 상태 재조회해서 다음 가능일 안내

      ? (() => { const dt = new Date(st.next_available_at); return `${dt.getMonth()+1}월 ${dt.getDate()}일`; })()
      : '-';

  }

}

// ===== RANK EFFECTS =====
function showRankEffect(rank, score) {
  const popup = document.getElementById('rank-popup');
  const emojiEl = document.getElementById('rp-emoji');
  const rankEl = document.getElementById('rp-rank');
  const labelEl = document.getElementById('rp-label');
  if (rank === 'S') {
    emojiEl.textContent = '🏆';
    rankEl.textContent = 'S랭크!';
    rankEl.style.cssText = 'font-size:48px;font-weight:900;background:linear-gradient(135deg,#ffd700,#ff9500);-webkit-background-clip:text;-webkit-text-fill-color:transparent';
    labelEl.textContent = '전설의 급식 달성! ' + score + '점';
    popup.classList.remove('hide');
    launchConfetti();
    setTimeout(() => popup.classList.add('hide'), 2800);
  } else if (rank === 'D') {
    emojiEl.textContent = '😭';
    rankEl.textContent = 'D랭크...';
    rankEl.style.cssText = 'font-size:48px;font-weight:900;color:var(--text3)';
    labelEl.textContent = '아쉬운 급식이네요 ' + score + '점';
    popup.classList.remove('hide');
    launchTears();
    setTimeout(() => popup.classList.add('hide'), 2000);
  } else if (rank === 'A') {
    emojiEl.textContent = '✨';
    rankEl.textContent = 'A랭크!';
    rankEl.style.cssText = 'font-size:48px;font-weight:900;color:var(--purple)';
    labelEl.textContent = '갓급식! ' + score + '점';
    popup.classList.remove('hide');
    setTimeout(() => popup.classList.add('hide'), 1800);
  }
}
function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.classList.remove('hide');
  wrap.innerHTML = '';
  const colors = ['#ffd700','#ff4757','#3182f6','#7c3aed','#03b26c','#ff9f1c'];
  for (let i = 0; i < 60; i++) {
    const cp = document.createElement('div');
    cp.className = 'cp';

function launchTears() {
  const wrap = document.getElementById('confetti-wrap');

// ===== SHARE CARD =====
async function generateShareCard(schoolName, score, rank, menu, rankObj) {
  const canvas = document.createElement('canvas');
  const W = 900, H = 900;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  // 배경 그라디언트
  const grad = ctx.createLinearGradient(0, 0, W, H);
  if (rankObj.r === 'S') { grad.addColorStop(0,'#1a1a2e'); grad.addColorStop(1,'#16213e'); }
  else if (rankObj.r === 'A') { grad.addColorStop(0,'#3b1a8f'); grad.addColorStop(1,'#1e0a5e'); }
  else if (rankObj.r === 'B') { grad.addColorStop(0,'#1a3a8f'); grad.addColorStop(1,'#0a1e5e'); }
  else if (rankObj.r === 'D') { grad.addColorStop(0,'#2a2a2a'); grad.addColorStop(1,'#1a1a1a'); }
  else { grad.addColorStop(0,'#5e4a1e'); grad.addColorStop(1,'#3a2e0e'); }
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // 상단 태그
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.roundRect(W/2-80, 50, 160, 44, 22); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.font = 'bold 18px Arial, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('오늘급식', W/2, 78);
  // 이모지 + 랭크
  const emoji = rankObj.r==='S'?'🏆':rankObj.r==='A'?'✨':rankObj.r==='D'?'😭':'🍱';
  ctx.font = '90px serif';
  ctx.fillText(emoji, W/2, 200);
  // 랭크 텍스트
  ctx.font = 'bold 72px Arial, sans-serif';
  if (rankObj.r === 'S') {
    const g2 = ctx.createLinearGradient(W/2-80, 0, W/2+80, 0);
    g2.addColorStop(0,'#ffd700'); g2.addColorStop(1,'#ff9500');
    ctx.fillStyle = g2;
  } else { ctx.fillStyle = 'white'; }
  ctx.fillText(rankObj.r + '랭크', W/2, 295);
  // 학교명
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 44px Arial, sans-serif';
  ctx.fillText(schoolName, W/2, 370);
  // 점수
  ctx.fillStyle = 'white';
  ctx.font = 'bold 96px Arial, sans-serif';
  ctx.fillText(score + '점', W/2, 480);
  // 구분선
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, 510); ctx.lineTo(W-60, 510); ctx.stroke();
  // 메뉴 목록
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.font = '28px Arial, sans-serif';
  const menuItems = menu.slice(0, 4);
  menuItems.forEach((item, i) => { ctx.fillText(item, W/2, 555 + i * 44); });
  // 하단 태그
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '22px Arial, sans-serif';
  ctx.fillText(`#오늘급식 #${schoolName} #${rankObj.l}`, W/2, 780);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '18px Arial, sans-serif';
  ctx.fillText('ssuksak.github.io/lunch-arena', W/2, 820);
  return canvas.toDataURL('image/png');
}
async function shareCurrentCard() {
  if (!pendingShare) return;
  const { schoolName, score, rankObj, menu } = pendingShare;
  const school = currentSchool || mySchool;
  const shareUrl = school?.id
    ? `https://ssuksak.github.io/lunch-arena/?school=${school.id}`
    : `https://ssuksak.github.io/lunch-arena/`;
  try {
    const dataUrl = await generateShareCard(schoolName, score, null, menu, rankObj);
    const blob = await (await fetch(dataUrl)).blob();
    const file = new File([blob], '오늘급식.png', { type: 'image/png' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: `${schoolName} 오늘 급식 ${rankObj.r}랭크!`, text: `${schoolName} 오늘 급식 ${score}점 (${rankObj.l})\n#오늘급식\n${shareUrl}` });
    } else {
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = `오늘급식_${schoolName}_${score}점.png`;
      a.click();
    }
  } catch(e) {
    // canvas/share 실패 시 링크 복사 fallback
    const text = `[오늘급식] ${schoolName} 오늘 급식 ${score}점 (${rankObj.l})\n${shareUrl}`;
    try {
      await navigator.clipboard.writeText(text);
      alert('링크가 복사됐어요! 단톡에 붙여넣기 해봐 😊');
    } catch {
      alert(`공유할 링크:\n${shareUrl}`);
    }
  }
}

const POPULAR=['치킨','피자','떡볶이','햄버거','돈까스','돈가스','카레','짜장','탕수육','제육','불고기','갈비','스파게티','파스타','라면','순대','핫도그','너겟'];
const DESSERTS=['케이크','아이스크림','푸딩','젤리','요구르트','요거트','딸기','귤','사과','바나나','포도','수박','초코','쿠키','빵','주스','우유'];
const HEALTHY=['나물','샐러드','두부','콩','시금치','브로콜리','당근','버섯','미역','김','고등어','연어','잡곡','보리','현미'];
function menuItemHtml(m) {
  let tag = '';
  for(const p of POPULAR){if(m.includes(p)){tag='<span class="tag tag-pop">인기</span>';break;}}
  if(!tag)for(const d of DESSERTS){if(m.includes(d)){tag='<span class="tag tag-des">후식</span>';break;}}
  if(!tag)for(const h of HEALTHY){if(m.includes(h)){tag='<span class="tag tag-hlt">건강</span>';break;}}
  return `<li${tag?' class="hl"':''}>${m} ${tag}</li>`;
}
function schoolItemHtml(s, onclick) {
  const cls = s.type?.includes('초') ? 'elem' : s.type?.includes('중') ? 'mid' : 'high';
  const emoji = s.type?.includes('초') ? '🌱' : s.type?.includes('중') ? '📘' : '🎓';
  return `<div class="sr-item" onclick="${onclick}">
    <div class="sr-icon ${cls}">${emoji}</div>
    <div class="sr-info"><div class="sr-name">${s.name}</div><div class="sr-addr">${s.address||''}</div></div>
  </div>`;
}
function getRank(s) {
  if(s>=90)return{r:'S',l:'전설의 급식',c:'rank-s'};
  if(s>=75)return{r:'A',l:'갓급식',c:'rank-a'};
  if(s>=55)return{r:'B',l:'괜찮은 급식',c:'rank-b'};
  if(s>=35)return{r:'C',l:'그저 그런 급식',c:'rank-c'};
  return{r:'D',l:'아쉬운 급식',c:'rank-d'};
}

let currentRatingMealId = null;
function setRating(n, mealId) {
  selectedRating = n;
  document.querySelectorAll(`#stars-${mealId} .star`).forEach((s, i) => {
    s.classList.toggle('filled', i < n); s.classList.toggle('empty', i >= n);

}
function onPhotoSelected(input) {
  const file = input.files[0];
  if (!file) return;
  selectedPhotoFile = file;
  const mid = currentRatingMealId;
  const reader = new FileReader();
  reader.onload = e => {
    const prev = document.getElementById(`photo-prev-${mid}`);
    const img = document.getElementById(`photo-img-${mid}`);
    if (prev && img) { img.src = e.target.result; prev.style.display = 'block'; }

  reader.readAsDataURL(file);
}
function removePhoto(mealId) {

}
async function uploadPhoto(file) {
  const ext = file.name.split('.').pop() || 'jpg';
  const path = `${Date.now()}-${FP}.${ext}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/reviews/${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': file.type }
    , body: file
  });
  if (!res.ok) throw new Error('업로드 실패');
  return `${SUPABASE_URL}/storage/v1/object/public/reviews/${path}`;
}
async function submitRating(mealId) {

  const btn = document.getElementById(`btn-rate-${mealId}`);

    body: JSON.stringify(body)
  });
  if (res.status === 409) {

  }

function changeRankDate(delta) {
  rankDate.setDate(rankDate.getDate() + delta);
  const dow = rankDate.getDay();
  if (delta > 0) {
    if (dow === 6) rankDate.setDate(rankDate.getDate() + 2);
    else if (dow === 0) rankDate.setDate(rankDate.getDate() + 1);
  } else {
    if (dow === 0) rankDate.setDate(rankDate.getDate() - 2);
    else if (dow === 6) rankDate.setDate(rankDate.getDate() - 1);
  }
  document.getElementById('rank-date').textContent = fmtDateKR(rankDate);
  loadFullRanking();
}
function setRankFilter(f, el) {
  rankFilter = f;
  document.querySelectorAll('.filter-row .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  loadFullRanking();
}
async function loadFullRanking() {
  const dateStr = fmtDate(rankDate);
  let query = `meals?meal_date=eq.${dateStr}&order=auto_score.desc&limit=30&select=id,auto_score,auto_rank,menu,school_id,schools(id,name,type,atpt_code,school_code,address)`;
  if (rankFilter === 'elem') query += '&schools.type=ilike.*초등*';
  else if (rankFilter === 'mid') query += '&schools.type=ilike.*중학*';
  else if (rankFilter === 'high') query += '&schools.type=ilike.*고등*';
  const data = await sb(query);
  if (!data || data.length === 0) {
    document.getElementById('full-ranking').innerHTML = `<div class="empty"><div class="empty-emoji">📊</div><div>이 날짜 급식 데이터가 없어요<br>학교를 검색해서 조회해보세요!</div></div>`;
    return;
  }
  const myId = mySchool?.id;
  document.getElementById('full-ranking').innerHTML = data.map((m, i) => {
    const s = m.schools;
    const rank = i + 1;
    const numCls = rank <= 3 ? `rank-${rank}` : '';
    const isMine = s?.id === myId;
    const preview = (m.menu || []).slice(0, 3).join(' · ');
    return `<div class="ranking-card${isMine?' mine':''}" onclick="selectDetailSchool(${JSON.stringify(s).replace(/"/g,'&quot;')});switchTab('home')">
      <div class="rank-num ${numCls}">${rank}</div>
      <div class="rank-info">
        <div class="rank-school">${s?.name || '?'}${isMine ? ' ⭐ 내 학교' : ''}</div>
        <div class="rank-menu-preview">${preview}</div>
      </div>
      <div class="rank-score">${m.auto_score}</div>
    </div>`;
  }).join('');
}

// ===== BATTLE =====
async function loadBattle() {
  const wrap = document.getElementById('battle-content');
  wrap.innerHTML = '<div class="loading"><div class="loading-emoji">⚔️</div><div class="loading-text">배틀 준비 중...</div></div>';
  if (!mySchool) {
    wrap.innerHTML = `<div class="empty"><div class="empty-emoji">🏫</div><div>내 학교를 설정하면<br>오늘의 배틀을 볼 수 있어요!</div><button onclick="showOnboarding()" style="margin-top:16px;padding:12px 24px;background:var(--blue);color:white;border:none;border-radius:12px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer">내 학교 설정하기</button></div>`;
    return;
  }
  const today = fmtDate(fixWeekend(new Date()));
  // 1. 기존 배틀 확인
  const existing = await sb(`battles?battle_date=eq.${today}&select=*,school_a:schools!battles_school_a_id_fkey(id,name,type,address),school_b:schools!battles_school_b_id_fkey(id,name,type,address),meal_a:meals!battles_meal_a_id_fkey(menu,auto_score),meal_b:meals!battles_meal_b_id_fkey(menu,auto_score)&or=(school_a_id.eq.${mySchool.id},school_b_id.eq.${mySchool.id})&limit=1`);
  if (existing && existing.length > 0) { renderBattleCard(existing[0]); return; }
  // 2. 내 학교 급식 로드
  const myMealResult = await edge('sync-meals', { atpt_code: mySchool.atpt_code, school_code: mySchool.school_code, date: today });
  if (!myMealResult.meal) {
    wrap.innerHTML = `<div class="empty"><div class="empty-emoji">😢</div><div>오늘 내 학교 급식 정보가 없어서<br>배틀을 만들 수 없어요</div></div>`;
    return;
  }
  // 3. 오늘 다른 학교 급식 찾기
  const otherMeals = await sb(`meals?meal_date=eq.${today}&school_id=neq.${mySchool.id}&select=id,auto_score,school_id,schools(id,name,type,address,atpt_code,school_code)&limit=10`);
  let oppSchool = null, oppMeal = null;
  const myTypeKey = mySchool.type?.includes('초') ? '초' : mySchool.type?.includes('중') ? '중' : '고';
  const myCity = (mySchool.address || '').split(' ')[0];
  if (otherMeals && otherMeals.length > 0) {
    // 같은 유형 + 같은 도시 우선
    let best = otherMeals.find(o => o.schools?.type?.includes(myTypeKey) && (o.schools?.address||'').startsWith(myCity));
    if (!best) best = otherMeals.find(o => o.schools?.type?.includes(myTypeKey));
    if (!best) best = otherMeals[0];
    if (best) { oppSchool = best.schools; oppMeal = { id: best.id, auto_score: best.auto_score, menu: best.menu }; }
  }
  if (!oppSchool) {
    // 학교 테이블에서 같은 유형 학교 찾아서 급식 캐시
    const candidates = await sb(`schools?type=ilike.*${encodeURIComponent(myTypeKey)}*&id=neq.${mySchool.id}&limit=5&select=id,name,type,address,atpt_code,school_code`);
    for (const cand of (candidates || [])) {
      const r = await edge('sync-meals', { atpt_code: cand.atpt_code, school_code: cand.school_code, date: today });
      if (r.meal) { oppSchool = cand; oppMeal = r.meal; break; }
    }
  }
  if (!oppSchool) {
    wrap.innerHTML = `<div class="empty"><div class="empty-emoji">🔍</div><div>오늘 배틀 상대 학교를 찾지 못했어요<br>잠시 후 다시 시도해보세요</div></div>`;
    return;
  }
  // 4. 배틀 생성
  const aId = Math.min(mySchool.id, oppSchool.id);
  const bId = Math.max(mySchool.id, oppSchool.id);
  const isA = mySchool.id === aId;
  const newBattle = await fetch(`${SUPABASE_URL}/rest/v1/battles`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
    body: JSON.stringify({
      battle_date: today,
      school_a_id: aId, school_b_id: bId,
      meal_a_id: isA ? myMealResult.meal.id : oppMeal.id,
      meal_b_id: isA ? oppMeal.id : myMealResult.meal.id,
      score_a: isA ? myMealResult.meal.auto_score : oppMeal.auto_score,
      score_b: isA ? oppMeal.auto_score : myMealResult.meal.auto_score,
    })
  }).then(r => r.json());
  if (newBattle && !newBattle.error) {
    // 방금 생성한 배틀 다시 fetch (조인 포함)
    const fresh = await sb(`battles?id=eq.${newBattle[0]?.id || newBattle.id}&select=*,school_a:schools!battles_school_a_id_fkey(id,name,type,address),school_b:schools!battles_school_b_id_fkey(id,name,type,address),meal_a:meals!battles_meal_a_id_fkey(menu,auto_score),meal_b:meals!battles_meal_b_id_fkey(menu,auto_score)&limit=1`);
    if (fresh && fresh.length > 0) renderBattleCard(fresh[0]); else renderBattleCardRaw(newBattle[0] || newBattle, isA ? {school: mySchool, meal: myMealResult.meal} : {school: oppSchool, meal: oppMeal}, isA ? {school: oppSchool, meal: oppMeal} : {school: mySchool, meal: myMealResult.meal});
  } else {
    // 이미 있으면 다시 fetch
    const retry = await sb(`battles?battle_date=eq.${today}&select=*,school_a:schools!battles_school_a_id_fkey(id,name,type,address),school_b:schools!battles_school_b_id_fkey(id,name,type,address),meal_a:meals!battles_meal_a_id_fkey(menu,auto_score),meal_b:meals!battles_meal_b_id_fkey(menu,auto_score)&or=(school_a_id.eq.${mySchool.id},school_b_id.eq.${mySchool.id})&limit=1`);
    if (retry && retry.length > 0) renderBattleCard(retry[0]);
  }
}
function renderBattleCard(battle) {
  const sA = battle.school_a, sB = battle.school_b;
  const mA = battle.meal_a, mB = battle.meal_b;
  if (!sA || !sB) { document.getElementById('battle-content').innerHTML = '<div class="empty"><div class="empty-emoji">😵</div><div>배틀 데이터를 불러오지 못했어요</div></div>'; return; }
  const voted = localStorage.getItem(`voted_battle_${battle.id}`);
  const iconA = sA.type?.includes('초') ? '🌱' : sA.type?.includes('중') ? '📘' : '🎓';
  const iconB = sB.type?.includes('초') ? '🌱' : sB.type?.includes('중') ? '📘' : '🎓';
  const bgA = sA.type?.includes('초') ? 'var(--green-l)' : sA.type?.includes('중') ? 'var(--blue-l)' : 'var(--purple-l)';
  const bgB = sB.type?.includes('초') ? 'var(--green-l)' : sB.type?.includes('중') ? 'var(--blue-l)' : 'var(--purple-l)';
  const totalVotes = (battle.vote_a || 0) + (battle.vote_b || 0);
  const pctA = totalVotes > 0 ? Math.round(battle.vote_a * 100 / totalVotes) : 50;
  const pctB = 100 - pctA;
  const menuA = (mA?.menu || []).slice(0, 5).map(m => `<li>${m}</li>`).join('');
  const menuB = (mB?.menu || []).slice(0, 5).map(m => `<li>${m}</li>`).join('');
  const scoreA = battle.score_a || mA?.auto_score || 0;
  const scoreB = battle.score_b || mB?.auto_score || 0;
  const winA = scoreA > scoreB, tie = scoreA === scoreB;
  // AI 판정 텍스트
  const aiVerdict = tie ? '🤝 동점' : `🏆 AI 판정: ${winA ? sA.name : sB.name} 승`;
  // 여론 vs AI 역전 여부
  const opinionWinA = pctA > pctB;
  const reversed = totalVotes >= 5 && ((winA && !opinionWinA) || (!winA && opinionWinA && !tie));
  const reverseText = reversed ? '⚡ 여론 역전!' : '';

  document.getElementById('battle-content').innerHTML = `
    <div class="vs-card">
      <!-- AI 판정 -->
      <div class="battle-verdict">
        <div class="verdict-ai">AI 판정</div>
        <div class="verdict-result">${aiVerdict}</div>
      </div>
      <!-- 메뉴 비교 -->
      <div class="vs-top">
        <div class="vs-school">
          <div class="vs-school-icon" style="background:${bgA}">${iconA}</div>
          <div class="vs-school-name">${sA.name}</div>
          <div class="vs-score${winA?' win':' lose'}">${scoreA}점</div>
        </div>
        <div class="vs-divider"><div class="vs-badge">VS</div></div>
        <div class="vs-school b">
          <div class="vs-school-icon" style="background:${bgB};margin-left:auto">${iconB}</div>
          <div class="vs-school-name">${sB.name}</div>
          <div class="vs-score${!winA&&!tie?' win':tie?'':' lose'}">${scoreB}점</div>
        </div>
      </div>
      <div class="vs-menu-row">
        <div class="vs-menu"><ul>${menuA||'<li style="color:var(--text3)">급식 없음</li>'}</ul></div>
        <div class="vs-menu b"><ul>${menuB||'<li style="color:var(--text3)">급식 없음</li>'}</ul></div>
      </div>
      <!-- 여론 섹션 -->
      <div class="battle-opinion">
        <div class="opinion-title">
          💬 여론은?
          ${voted ? `<span style="color:var(--green);font-size:11px">✓ 투표 완료</span>` : `<span class="opinion-live">LIVE</span>`}
          ${reverseText ? `<span style="color:var(--battle-red);font-weight:800">${reverseText}</span>` : ''}
        </div>
        ${totalVotes > 0 ? `
          <div class="vote-bar-labels" style="margin-bottom:6px">
            <span style="color:var(--blue);font-weight:800">${sA.name} ${pctA}%</span>
            <span style="color:var(--text3);font-size:11px">${totalVotes}명 투표</span>
            <span style="color:var(--purple);font-weight:800">${pctB}% ${sB.name}</span>
          </div>
          <div class="vote-bar-bg">
            <div class="vote-bar-a" style="width:${pctA}%"></div>
            <div class="vote-bar-b" style="width:${pctB}%"></div>
          </div>` :
          `<div style="font-size:13px;color:var(--text3);margin-bottom:8px">아직 아무도 안 했어요! 첫 투표 주인공이 되세요</div>`}
        ${!voted ? `
          <div class="vs-vote-row" style="margin-top:10px">
            <button class="btn-vote a" onclick="voteBattle(${battle.id},'${sA.id}','a')">👆 ${sA.name}</button>
            <button class="btn-vote b" onclick="voteBattle(${battle.id},'${sB.id}','b')">👆 ${sB.name}</button>
          </div>` : ''}
        ${voted ? `<button class="vote-share-btn" onclick="shareBattle('${sA.name}','${sB.name}',${scoreA},${scoreB},${pctA},${pctB})">📤 이 결과 공유하기</button>` : ''}
      </div>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--text3);margin-top:8px;padding-bottom:4px">매일 자동 매칭 · AI 점수 기준</div>
  `;
}
async function voteBattle(battleId, schoolId, side) {
  const voted = localStorage.getItem(`voted_battle_${battleId}`);
  if (voted) return;
  // 낙관적 UI 업데이트
  document.querySelectorAll('.btn-vote').forEach(b => {
    b.classList.toggle('selected', b === event.target);
    b.classList.toggle('unselected', b !== event.target);
  });
  // DB insert
  const res = await fetch(`${SUPABASE_URL}/rest/v1/battle_votes`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ battle_id: battleId, voted_school_id: schoolId, fingerprint: FP })
  });
  // vote_a/vote_b 업데이트
  const field = side === 'a' ? 'vote_a' : 'vote_b';
  await fetch(`${SUPABASE_URL}/rest/v1/battles?id=eq.${battleId}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ [field]: (await sb(`battles?id=eq.${battleId}&select=${field}`).then(d => (d[0]?.[field] || 0))) + 1 })
  });
  localStorage.setItem(`voted_battle_${battleId}`, side);
  // 다시 렌더
  const fresh = await sb(`battles?id=eq.${battleId}&select=*,school_a:schools!battles_school_a_id_fkey(id,name,type),school_b:schools!battles_school_b_id_fkey(id,name,type),meal_a:meals!battles_meal_a_id_fkey(menu,auto_score),meal_b:meals!battles_meal_b_id_fkey(menu,auto_score)&limit=1`);
  if (fresh && fresh.length > 0) renderBattleCard(fresh[0]);
}
function shareBattle(nameA, nameB, scoreA, scoreB, pctA, pctB) {
  const aiWinner = scoreA > scoreB ? nameA : scoreB > scoreA ? nameB : '동점';
  const opinionWinner = pctA > pctB ? nameA : pctB > pctA ? nameB : '동점';
  const reversed = aiWinner !== opinionWinner && aiWinner !== '동점';
  const text = `⚔️ [오늘급식] 오늘의 배틀\n${nameA} ${scoreA}점 vs ${nameB} ${scoreB}점\n\n🤖 AI 판정: ${aiWinner} 승\n💬 여론: ${opinionWinner} ${pctA > pctB ? pctA : pctB}%${reversed ? '\n⚡ 여론 역전!' : ''}\n\nhttps://ssuksak.github.io/lunch-arena/`;
  if (navigator.share) navigator.share({ title: '오늘급식 배틀 결과', text });
  else { navigator.clipboard?.writeText(text); alert('결과가 클립보드에 복사됐어요!'); }
}

async function loadMapSchools() {
  let all = [], page = 0;
  while (true) {
    const data = await fetch(`${SUPABASE_URL}/rest/v1/schools?select=id,name,type,lat,lng,atpt_code,school_code,address&lat=not.is.null&lng=not.is.null&order=id&limit=1000&offset=${page*1000}`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    }).then(r => r.json());
    if (!data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < 1000) break;
    page++;
  }
  mapSchools = all;
  document.getElementById('map-school-count').textContent = all.length.toLocaleString() + '개 학교';
  const markers = all.map(s => {
    const marker = new kakao.maps.Marker({ position: new kakao.maps.LatLng(s.lat, s.lng), clickable: true });
    kakao.maps.event.addListener(marker, 'click', () => { openBottomSheet(s); kakaoMap.setCenter(new kakao.maps.LatLng(s.lat, s.lng)); kakaoMap.setLevel(3); });
    return marker;
  });
  clusterer.addMarkers(markers);
  // 내 학교 위치로 이동
  if (mySchool) {
    const mine = all.find(s => s.id === mySchool.id);
    if (mine) { kakaoMap.setCenter(new kakao.maps.LatLng(mine.lat, mine.lng)); kakaoMap.setLevel(6); }
  }
}
async function openBottomSheet(school) {
  const bs = document.getElementById('bottom-sheet');
  const bsc = document.getElementById('bs-content');
  const isElem = school.type?.includes('초'), isMid = school.type?.includes('중');
  const bgColor = isElem ? 'var(--green-l)' : isMid ? 'var(--blue-l)' : 'var(--purple-l)';
  const emoji = isElem ? '🌱' : isMid ? '📘' : '🎓';
  bsc.innerHTML = `
    <div class="bs-header">
      <div class="bs-icon" style="background:${bgColor}">${emoji}</div>
      <div><div class="bs-name">${school.name}</div><div class="bs-meta">${school.type||''} · ${school.address||''}</div></div>
      <button class="bs-close" onclick="closeBottomSheet()">✕</button>
    </div>
    <div style="text-align:center;padding:12px;color:var(--text3)"><div style="font-size:24px">🍳</div><div style="font-size:13px">급식 불러오는 중...</div></div>`;
  bs.classList.add('show');
  const today = fmtDate(fixWeekend(new Date()));
  const result = await edge('sync-meals', { atpt_code: school.atpt_code, school_code: school.school_code, date: today });
  if (result.meal) {
    const m = result.meal, rank = getRank(m.auto_score);
    bsc.innerHTML = `
      <div class="bs-header">
        <div class="bs-icon" style="background:${bgColor}">${emoji}</div>
        <div><div class="bs-name">${school.name}</div><div class="bs-meta">${school.type||''} · ${school.address||''}</div></div>
        <button class="bs-close" onclick="closeBottomSheet()">✕</button>
      </div>
      <div class="bs-menu-title"><span>${fmtDateKR(fixWeekend(new Date()))} 급식</span>
        <span class="meal-rank-badge ${rank.c}" style="font-size:11px;padding:3px 8px">${rank.r} · ${m.auto_score}점</span>
      </div>
      <ul class="bs-menu-list">${(m.menu||[]).map(i=>`<li>${i}</li>`).join('')}</ul>
      <div style="font-size:12px;color:var(--text3);margin-bottom:12px">🔥 ${m.calories||'?'} kcal</div>
      <button class="bs-btn" onclick="selectDetailSchool(${JSON.stringify(school).replace(/"/g,'&quot;')});closeBottomSheet();switchTab('home')">상세보기 · 평가하기</button>`;
  } else {
    bsc.innerHTML = `
      <div class="bs-header">
        <div class="bs-icon" style="background:${bgColor}">${emoji}</div>
        <div><div class="bs-name">${school.name}</div><div class="bs-meta">${school.type||''} · ${school.address||''}</div></div>
        <button class="bs-close" onclick="closeBottomSheet()">✕</button>
      </div>
      <div style="text-align:center;padding:20px;color:var(--text3)"><div style="font-size:24px">😢</div><div style="font-size:13px">오늘 급식 정보가 없어요</div></div>
      <button class="bs-btn" onclick="selectDetailSchool(${JSON.stringify(school).replace(/"/g,'&quot;')});closeBottomSheet();switchTab('home')">다른 날짜 확인하기</button>`;
  }
}
function closeBottomSheet() { document.getElementById('bottom-sheet').classList.remove('show'); }
function goMyLocation() {
  if (!navigator.geolocation || !kakaoMap) return;
  navigator.geolocation.getCurrentPosition(pos => { kakaoMap.setCenter(new kakao.maps.LatLng(pos.coords.latitude, pos.coords.longitude)); kakaoMap.setLevel(4); });
}

// ===== INIT =====
async function init() {
  await loadMySchool();
  // 스탯 카운트
  const [schoolCount, mealCount, ratingCount] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/schools?select=id`, { headers: { 'apikey': SUPABASE_KEY, 'Prefer': 'count=exact', 'Range': '0-0' } }).then(r => { const cr = r.headers.get('content-range'); return cr ? parseInt(cr.split('/')[1]) : 0; }),
    fetch(`${SUPABASE_URL}/rest/v1/meals?meal_date=eq.${fmtDate(mealDate)}&select=id`, { headers: { 'apikey': SUPABASE_KEY, 'Prefer': 'count=exact', 'Range': '0-0' } }).then(r => { const cr = r.headers.get('content-range'); return cr ? parseInt(cr.split('/')[1]) : 0; }),
    fetch(`${SUPABASE_URL}/rest/v1/ratings?select=id`, { headers: { 'apikey': SUPABASE_KEY, 'Prefer': 'count=exact', 'Range': '0-0' } }).then(r => { const cr = r.headers.get('content-range'); return cr ? parseInt(cr.split('/')[1]) : 0; }),
  ]);
  document.getElementById('stat-schools').textContent = Number(schoolCount).toLocaleString();
  document.getElementById('stat-meals').textContent = mealCount > 0 ? mealCount.toLocaleString() : '-';
  document.getElementById('stat-ratings').textContent = ratingCount > 0 ? ratingCount.toLocaleString() : '0';
  // 오늘 랭킹 TOP5
  const todayMeals = await sb(`meals?meal_date=eq.${fmtDate(mealDate)}&order=auto_score.desc&limit=5&select=auto_score,auto_rank,menu,schools(id,name,type)`);
  if (todayMeals && todayMeals.length > 0) {
    document.getElementById('today-ranking').innerHTML = todayMeals.map((m, i) => {
      const numCls = i < 3 ? `rank-${i+1}` : '';
      const preview = (m.menu||[]).slice(0,3).join(' · ');
      return `<div class="ranking-card"><div class="rank-num ${numCls}">${i+1}</div><div class="rank-info"><div class="rank-school">${m.schools?.name||'?'}</div><div class="rank-menu-preview">${preview}</div></div><div class="rank-score">${m.auto_score}</div></div>`;
    }).join('');
  } else {
    document.getElementById('today-ranking').innerHTML = `<div class="empty"><div class="empty-emoji">🍽</div><div>아직 오늘 급식 데이터가 없어요<br>학교를 검색해서 첫 조회를 해보세요!</div></div>`;
  }
}

// ===== URL 파라미터 처리 (바이럴 루프) =====
async function handleUrlParam() {
  const params = new URLSearchParams(location.search);
  let schoolId = params.get('school');
  // hash fallback: #school=123
  if (!schoolId && location.hash.startsWith('#school=')) {
    schoolId = location.hash.slice(8);
  }
  if (!schoolId) return;

  // 학교 정보 조회
  const schools = await sb(`schools?id=eq.${encodeURIComponent(schoolId)}&limit=1`);
  if (!schools || schools.length === 0) return;

  const school = schools[0];
  // 홈 탭으로 이동 후 해당 학교 상세 오픈
  switchTab('home');
  selectDetailSchool(school);

  // URL 파라미터 제거 (뒤로가기 시 재실행 방지)
  const cleanUrl = location.pathname;
  history.replaceState(null, '', cleanUrl);
}

// 카카오맵 지연 로드 (홈 탭엔 지도 없음, 지도 탭 진입 시 로드)
try { kakao.maps.load(function() {}); } catch(e) {}
init().then(() => handleUrlParam());
</script>
